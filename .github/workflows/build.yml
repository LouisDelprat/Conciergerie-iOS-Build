name: Build iOS IPA
on: [push]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install system dependencies
        run: |
          brew install autoconf automake libtool pkg-config
          
      - name: Install Python dependencies
        run: |
          # On ajoute 'packaging' ici
          pip install buildozer kivy-ios cython packaging
          
      - name: Build IPA
        run: |
          buildozer ios debug
          
      - name: Force IPA Creation
        run: |
          echo "Recherche du dossier .app..."
          # On cherche partout dans le dossier ios pour trouver le .app compilé
          APP_FOLDER=$(find .buildozer/ios/platform -name "*.app" -type d | grep "release" || find .buildozer/ios/platform -name "*.app" -type d | head -n 1)
          
          if [ -z "$APP_FOLDER" ]; then
            echo "ERREUR : Dossier .app introuvable malgré le succès de l'archive."
            exit 1
          fi
          
          echo "Dossier trouvé : $APP_FOLDER"
          
          # Création de la structure IPA officielle
          mkdir -p Payload
          cp -r "$APP_FOLDER" Payload/
          
          # On compresse en .ipa
          zip -r Conciergerie.ipa Payload
          
          # On le déplace dans bin pour l'artifact
          mkdir -p bin
          mv Conciergerie.ipa bin/
          echo "Fichier IPA créé avec succès dans bin/"

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: MonApp-iOS
          path: bin/Conciergerie.ipa
          if-no-files-found: error