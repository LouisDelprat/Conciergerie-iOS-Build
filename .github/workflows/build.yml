name: Build iOS IPA
on: [push]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install system dependencies
        run: |
          brew install autoconf automake libtool pkg-config
          
      - name: Install Python dependencies
        run: |
          pip install buildozer kivy-ios cython packaging
          
      - name: Build IPA (Xcode Project)
        run: |
          buildozer ios debug
          
      - name: Force IPA Creation
        run: |
          # Cette partie va chercher le dossier .app et le transformer en .ipa manuellement
          mkdir -p Payload
          # On cherche le dossier de l'app (il finit par .app)
          APP_PATH=$(find .buildozer/ios/platform/kivy-ios/build -name "*.app" -type d | head -n 1)
          cp -r "$APP_PATH" Payload/
          zip -r MonApp.ipa Payload
          mv MonApp.ipa bin/
          
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: MonApp-iOS
          path: bin/MonApp.ipa